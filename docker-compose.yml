version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: monopol-postgres
    environment:
      POSTGRES_USER: monopol
      POSTGRES_PASSWORD: monopol-dev
      POSTGRES_DB: monopol
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monopol"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: monopol-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: ./apps/api
      dockerfile: ../../infrastructure/docker/api.Dockerfile
    container_name: monopol-api
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://monopol:monopol-dev@postgres:5432/monopol
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:3000
      AI_SERVICE_URL: http://ai:8000
      API_URL: http://api:4000
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-auto}
      S3_BUCKET: ${S3_BUCKET:-monopol-studio}
      S3_ENDPOINT: ${S3_ENDPOINT}
      CDN_URL: ${CDN_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REPLICATE_API_KEY: ${REPLICATE_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      RENDER_SERVICE_URL: http://render:5001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/src
    command: npm run dev

  # Frontend
  web:
    build:
      context: ./apps/web
      dockerfile: ../../infrastructure/docker/web.Dockerfile
    container_name: monopol-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
    command: npm run dev

  # AI Services (Python / FastAPI)
  ai:
    build:
      context: ./apps/ai-services
    container_name: monopol-ai
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REPLICATE_API_TOKEN: ${REPLICATE_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-auto}
      S3_BUCKET: ${S3_BUCKET:-monopol-studio}
      S3_ENDPOINT: ${S3_ENDPOINT}
      CDN_URL: ${CDN_URL}
      ALLOWED_ORIGINS: http://localhost:3000,http://api:4000
    depends_on:
      - redis
    volumes:
      - ./apps/ai-services:/app
      - ai_models:/root/.u2net

volumes:
  postgres_data:
  ai_models:

networks:
  default:
    name: monopol-network
